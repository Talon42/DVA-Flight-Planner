      content="width=device-width, initial-scale=1.0"

    <link

    <title>Flight Planner</title>
    <script>
      (function () {
        try {
          var savedTheme = window.localStorage.getItem("flight-planner.theme");
          var resolvedTheme = savedTheme === "dark" ? "dark" : "light";
          document.documentElement.dataset.theme = resolvedTheme;
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch (_) {}
      })();
    </script>
    <style>
      @font-face {
        font-family: "Whitney Boot";
        src: url("/src/assets/fonts/whitneybook.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Whitney Boot";
        src: url("/src/assets/fonts/whitneysemibold.otf") format("opentype");
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Whitney Boot";
        src: url("/src/assets/fonts/whitneybold.otf") format("opentype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --boot-font-sans: "Whitney Boot", "Whitney", "Segoe UI", sans-serif;
        --boot-splash-width: 720px;
        --boot-card-width: 560px;
        --boot-eyebrow-size: 0.78rem;
        --boot-eyebrow-line-height: 1.2;
        --boot-title-size: clamp(1.75rem, 2.5vw, 2.7rem);
        --boot-title-line-height: 0.96;
        --boot-copy-size: 0.9rem;
        --boot-copy-line-height: 1.6;
        --boot-brand-size: clamp(2rem, 3vw, 3.6rem);
        --boot-brand-line-height: 0.96;
        color-scheme: light;
        font-family: var(--boot-font-sans);
        background:
          radial-gradient(circle at top left, rgba(11, 31, 54, 0.34), transparent 22%),
          radial-gradient(circle at top right, rgba(0, 58, 112, 0.24), transparent 24%),
          linear-gradient(155deg, #e4ebf4 0%, #dbe4ef 48%, #d1dce9 100%);
        color: #102136;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
      }

      html,
      body {
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(11, 31, 54, 0.34), transparent 22%),
          radial-gradient(circle at top right, rgba(0, 58, 112, 0.24), transparent 24%),
          linear-gradient(155deg, #e4ebf4 0%, #dbe4ef 48%, #d1dce9 100%);
      }

      #root {
        position: relative;
        min-height: 100vh;
        background: transparent;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        display: grid;
        align-content: center;
        justify-items: center;
        padding: 24px;
        font-family: var(--boot-font-sans);
        background:
          radial-gradient(circle at top left, rgba(11, 31, 54, 0.34), transparent 22%),
          radial-gradient(circle at top right, rgba(0, 58, 112, 0.24), transparent 24%),
          linear-gradient(155deg, #e4ebf4 0%, #dbe4ef 48%, #d1dce9 100%);
        z-index: 9999;
        transition: opacity 180ms ease;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        background:
          radial-gradient(circle at top left, rgba(200, 16, 46, 0.3), transparent 28%),
          radial-gradient(circle at top right, rgba(0, 58, 112, 0.16), transparent 30%),
          linear-gradient(155deg, #070f1b 0%, #121528 48%, #0f2135 100%);
        color: #ecf3fb;
      }

      :root[data-theme="dark"] html,
      :root[data-theme="dark"] body {
        background:
          radial-gradient(circle at top left, rgba(200, 16, 46, 0.3), transparent 28%),
          radial-gradient(circle at top right, rgba(0, 58, 112, 0.16), transparent 30%),
          linear-gradient(155deg, #070f1b 0%, #121528 48%, #0f2135 100%);
      }

      :root[data-theme="dark"] #boot-splash {
        background:
          radial-gradient(circle at top left, rgba(200, 16, 46, 0.3), transparent 28%),
          radial-gradient(circle at top right, rgba(0, 58, 112, 0.16), transparent 30%),
          linear-gradient(155deg, #070f1b 0%, #121528 48%, #0f2135 100%);
      }

      :root[data-theme="dark"] .boot-brand__title,
      :root[data-theme="dark"] .boot-title {
        color: #ffffff;
      }

      :root[data-theme="dark"] .boot-copy,
      :root[data-theme="dark"] .boot-status {
        color: #99afc7;
      }

      :root[data-theme="dark"] .boot-card {
        border-color: rgba(186, 209, 234, 0.14);
        background: rgba(10, 24, 43, 0.78);
        box-shadow: 0 26px 60px rgba(0, 0, 0, 0.34);
      }

      #boot-splash[hidden] {
        display: none;
      }

      body[data-app-ready="true"] #boot-splash {
        opacity: 0;
        pointer-events: none;
      }

      .boot-layout {
        width: min(var(--boot-splash-width), calc(100vw - 48px));
        display: grid;
        gap: 24px;
        justify-items: center;
      }

      .boot-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }

      .boot-brand__logo {
        width: 56px;
        height: 56px;
        object-fit: contain;
        flex: 0 0 auto;
      }

      .boot-brand__title {
        margin: 0;
        font-family: var(--boot-font-sans);
        font-size: var(--boot-brand-size);
        font-weight: 600;
        line-height: var(--boot-brand-line-height);
        letter-spacing: -0.06em;
        color: #0b1f36;
        text-align: center;
        white-space: nowrap;
      }

      .boot-card {
        width: min(var(--boot-card-width), calc(100vw - 48px));
        min-width: min(var(--boot-card-width), calc(100vw - 48px));
        max-width: min(var(--boot-card-width), calc(100vw - 48px));
        box-sizing: border-box;
        padding: 28px 30px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 54px rgba(10, 24, 43, 0.12);
        backdrop-filter: blur(18px);
        text-align: center;
      }

      .boot-eyebrow {
        margin: 0 0 10px;
        font-family: var(--boot-font-sans);
        font-size: var(--boot-eyebrow-size);
        font-weight: 700;
        line-height: var(--boot-eyebrow-line-height);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #c8102e;
      }

      .boot-title {
        margin: 0;
        font-family: var(--boot-font-sans);
        font-size: var(--boot-title-size);
        font-weight: 600;
        line-height: var(--boot-title-line-height);
        letter-spacing: -0.06em;
        color: #0b1f36;
      }

      .boot-copy {
        margin: 14px 0 0;
        font-family: var(--boot-font-sans);
        font-size: var(--boot-copy-size);
        font-weight: 400;
        color: #64758a;
        line-height: var(--boot-copy-line-height);
      }

      .boot-ellipsis {
        display: inline-grid;
        grid-auto-flow: column;
        gap: 0.25em;
        margin-left: 0.2em;
        vertical-align: baseline;
      }

      .boot-ellipsis span {
        opacity: 0.2;
        animation: boot-ellipsis 1.2s ease-in-out infinite;
      }

      .boot-ellipsis span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .boot-ellipsis span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes boot-ellipsis {
        0%,
        80%,
        100% {
          opacity: 0.2;
        }

        40% {
          opacity: 1;
        }
      }

      @media (max-width: 1180px) {
        .boot-brand {
          flex-wrap: nowrap;
          gap: 10px;
        }

        .boot-brand__logo {
          width: 44px;
          height: 44px;
        }
      }
    </style>
  </head>
