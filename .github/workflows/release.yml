name: Release Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Print Tauri environment info
        run: npm run tauri -- info

      - name: Build and publish EXE release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DVA Flight Planner ${{ github.ref_name }}
          releaseBody: |
            Windows executable build for ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          projectPath: .
          tauriScript: npm run tauri --
          args: --no-bundle --verbose
          uploadPlainBinary: true
